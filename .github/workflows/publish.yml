name: publish

on:
    pull_request:
        types: [ closed ]
        branches:
            - master
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            tag:
                description: existing tag to (re)publish (e.g. v0.0.1)
                required: true
                type: string

jobs:
    tag:
        if: github.event_name == 'pull_request' &&
            github.event.pull_request.merged == true &&
            github.event.pull_request.head.ref == 'dev'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            tag: ${{ steps.tag.outputs.tag }}
        steps:
            - name: -> checkout
              uses: actions/checkout@v4
              with:
                  ref: master
                  fetch-depth: 0

            - name: -> tag if version bumped
              id: tag
              run: |
                  version=$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
                  tag="v$version"
                  if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
                      echo "tag $tag already exists, skipping publish"
                      exit 0
                  fi
                  git tag "$tag"
                  git push origin "$tag"
                  echo "tag=$tag" >> "$GITHUB_OUTPUT"

    publish:
        needs: tag
        if: |
            always() && (
                github.event_name == 'push' ||
                github.event_name == 'workflow_dispatch' ||
                (needs.tag.result == 'success' && needs.tag.outputs.tag != '')
            )
        runs-on: ubuntu-latest
        environment:
            name: pypi
        permissions:
            contents: write
            id-token: write

        steps:
            - name: -> checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || needs.tag.outputs.tag || github.ref }}

            - name: -> setup py
              uses: actions/setup-python@v6
              with:
                  python-version-file: "pyproject.toml"

            - name: -> setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: -> setup just
              uses: extractions/setup-just@v3
              with:
                  just-version: "*"

            - name: -> sync
              run: just sync

            - name: -> ruff
              run: |
                  uv run ruff check --fix-only .

            - name: -> pyrefly
              run: uv run pyrefly check

            - name: build pkg
              uses: ./.github/actions/build

            - name: dl build
              uses: actions/download-artifact@v5
              with:
                  name: build-dist
                  path: dist/

            - name: -> publish
              run: just publish

            - name: -> release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag || needs.tag.outputs.tag || github.ref_name }}
                  generate_release_notes: true
                  files: dist/*
