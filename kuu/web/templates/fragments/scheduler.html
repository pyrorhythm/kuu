{% if jobs %}
<table class="kuu-table">
  <thead>
    <tr>
      <th>task</th>
      <th>next run</th>
      <th>rule</th>
    </tr>
  </thead>
  <tbody>
    {% for j in jobs %}
    <tr>
      <td class="mono-cell">{{ j.task_name }}</td>
      <td class="dim">{{ j.next_run.strftime("%H:%M:%S") }}</td>
      <td class="mono-cell">
        {%- if j.expr is defined -%}
          {{ j.expr }}
        {%- else -%}
          every {{ j.every.total_seconds()|int }}s
        {%- endif -%}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="placeholder">no scheduled jobs</p>
{% endif %}
