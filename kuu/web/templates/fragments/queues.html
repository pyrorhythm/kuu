{% if queues %}
<table class="kuu-table">
  <thead>
    <tr>
      <th>queue</th>
      <th>in flight</th>
      <th>depth</th>
      <th>instances</th>
    </tr>
  </thead>
  <tbody>
    {% for q in queues %}
    <tr>
      <td class="mono-cell">{{ q.name }}</td>
      <td>{{ q.in_flight }}</td>
      <td class="dim">{{ q.depth if q.depth is not none else "—" }}</td>
      <td class="dim">{{ q.instances }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="placeholder">no queue data</p>
{% endif %}
