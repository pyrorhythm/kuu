{% if processes %}
<table class="kuu-table">
  <thead>
    <tr>
      <th>pid</th>
      {% if processes[0].preset is not none %}<th>preset</th>{% endif %}
      <th>status</th>
    </tr>
  </thead>
  <tbody>
    {% for p in processes %}
    <tr>
      <td class="mono-cell">{{ p.pid }}</td>
      {% if p.preset is not none %}
      <td class="mono-cell dim">{{ p.preset }}</td>
      {% endif %}
      <td>
        {% if p.alive %}
        <span class="chip alive"><span class="dot"></span>alive</span>
        {% else %}
        <span class="chip dead"><span class="dot"></span>dead</span>
        {% endif %}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="placeholder">no worker processes</p>
{% endif %}
