<div class="surface-head" style="border-bottom:1px solid var(--hair);margin:-1px">
	<span class="surface-title">task detail</span>
	<span class="mono dim" style="margin-left:var(--s-2)" id="detail-mid">{{ message_id }}</span>
	<button class="btn" style="margin-left:auto"
		hx-get="fragments/task-runs" hx-target="#task-runs-frag" hx-swap="innerHTML">
		&larr; back to list</button>
</div>
<div class="surface-body flush" id="attempts-area">
	<p class="placeholder">loading attempts…</p>
</div>

<div id="log-stream-surface" style="border-top:1px solid var(--hair);display:none">
	<div class="surface-head" style="margin:0">
		<span class="surface-title">logs</span>
		<span class="mono dim" style="margin-left:var(--s-2)" id="log-attempt-tag" data-mid="" data-attempt=""></span>
		<div style="margin-left:auto;display:flex;gap:var(--s-2);align-items:center">
			<span class="dim" id="log-poll-indicator" style="font-size:11px"></span>
			<select id="log-level-filter" class="filter-select">
				<option value="0">all levels</option>
				<option value="10">≥ DEBUG</option>
				<option value="20" selected>≥ INFO</option>
				<option value="30">≥ WARNING</option>
				<option value="40">≥ ERROR</option>
			</select>
			<input id="log-search" class="filter-input" placeholder="search…" style="width:120px">
			<button class="btn btn-tiny" id="log-close-btn">close</button>
		</div>
	</div>
	<div class="surface-body flush" style="max-height:400px;overflow-y:auto" id="log-stream-body">
		<p class="placeholder">select an attempt to view logs</p>
	</div>
</div>

<script>
(function(){
	const mid = '{{ message_id }}';
	if(!mid){ document.getElementById('attempts-area').innerHTML='<p class="placeholder">no message_id</p>'; return; }

	fetch('api/task-run-attempts?message_id='+encodeURIComponent(mid))
		.then(r=>r.json()).then(d=>{
			if(!d.attempts){ return; }
			renderAttempts(d.attempts);
		}).catch(()=>{});

	function renderAttempts(attempts){
		const area = document.getElementById('attempts-area');
		if(!attempts||!attempts.length){ area.innerHTML='<p class="placeholder">no attempts found</p>'; return; }
		const task=attempts[0].task||'?', queue=attempts[0].queue||'?';
		let h = '<div class="detail-meta">'
			+'<span>task: <strong>'+esc(task)+'</strong></span>'
			+'<span class="dim">queue: '+esc(queue)+'</span>'
			+'<span class="dim">attempts: '+attempts.length+'</span></div>';
		h += '<table class="kuu-table"><thead><tr>'
			+'<th>#</th><th>status</th><th>started</th><th>finished</th>'
			+'<th>elapsed</th><th class="exc-col">exc</th><th></th></tr></thead><tbody>';
		for(const a of attempts){
			const started = a.started_at ? ts(a.started_at) : '—';
			const finished = a.finished_at ? ts(a.finished_at) : '—';
			const elapsed = a.time_elapsed!=null ? a.time_elapsed.toFixed(2)+'s' : '—';
			const sc = sbc(a.status);
			const exc = a.exc_type||'';
			h += '<tr class="attempt-row" data-attempt="'+a.attempt+'" title="click to expand">'
				+'<td>'+(a.attempt+1)+'</td>'
				+'<td><span class="status-badge '+sc+'">'+esc(a.status)+'</span></td>'
				+'<td class="dim">'+started+'</td>'
				+'<td class="dim">'+finished+'</td>'
				+'<td>'+elapsed+'</td>'
				+'<td class="mono-cell exc-cell" title="'+esc(exc)+'">'+esc(exc)+'</td>'
				+'<td class="action-cell"><button class="btn btn-primary btn-tiny view-logs-btn">logs</button></td></tr>';
			const args = a.args ? '<div class="detail-section"><div class="detail-label">args</div><pre class="detail-pre">'+esc(a.args)+'</pre></div>' : '';
			const kwargs = a.kwargs ? '<div class="detail-section"><div class="detail-label">kwargs</div><pre class="detail-pre">'+esc(a.kwargs)+'</pre></div>' : '';
			const trace = a.traceback ? '<div class="detail-section"><div class="detail-label">traceback</div><pre class="detail-pre traceback">'+esc(a.traceback)+'</pre></div>' : '';
			const excMsg = a.exc_message&&!a.traceback ? '<div class="detail-section"><div class="detail-label">error</div><pre class="detail-pre">'+esc(a.exc_message)+'</pre></div>' : '';
			const empty = !args && !kwargs && !trace && !excMsg
				? '<div class="detail-section dim">no captured args/kwargs/traceback</div>' : '';
			h += '<tr class="attempt-extra" style="display:none"><td colspan="7"><div class="detail-extra-body">'+args+kwargs+trace+excMsg+empty+'</div></td></tr>';
		}
		h += '</tbody></table>';
		area.innerHTML = h;

		area.querySelectorAll('.attempt-row').forEach(tr=>{
			tr.style.cursor='pointer';
			tr.addEventListener('click',function(e){
				if(e.target.closest('.view-logs-btn')) return;
				const extra=tr.nextElementSibling;
				if(extra&&extra.classList.contains('attempt-extra')){
					extra.style.display = extra.style.display==='none' ? '' : 'none';
				}
			});
		});
		area.querySelectorAll('.view-logs-btn').forEach(btn=>{
			btn.addEventListener('click',function(e){
				e.stopPropagation();
				const tr=this.closest('.attempt-row');
				const attempt=parseInt(tr.dataset.attempt||'0',10);
				const tag=document.getElementById('log-attempt-tag');
				tag.dataset.mid=mid;
				tag.dataset.attempt=String(attempt);
				tag.textContent='attempt #'+(attempt+1);
				const surface=document.getElementById('log-stream-surface');
				surface.style.display='';
				_logAfter=0;
				document.getElementById('log-stream-body').innerHTML='<p class="placeholder">loading…</p>';
				scheduleLoad(0);
			});
		});
	}

	let _logAfter=0, _logTimer, _searchTimer;

	function clearTimer(){ if(_logTimer){ clearTimeout(_logTimer); _logTimer=null; } }

	function scheduleLoad(delay){
		clearTimer();
		_logTimer=setTimeout(loadLogs, delay);
	}

	function loadLogs(){
		const body=document.getElementById('log-stream-body');
		const surface=document.getElementById('log-stream-surface');
		// detached or hidden — stop polling
		if(!body || !surface || surface.style.display==='none'){
			clearTimer();
			return;
		}
		const tag=document.getElementById('log-attempt-tag');
		const messageId=tag.dataset.mid||'';
		const attempt=parseInt(tag.dataset.attempt||'0',10);
		if(!messageId){ clearTimer(); return; }
		const lvl=parseInt(document.getElementById('log-level-filter').value)||0;
		const search=(document.getElementById('log-search').value||'').trim().toLowerCase();
		setPoll('fetching…');
		fetch('api/task-run-logs?message_id='+encodeURIComponent(messageId)+'&attempt='+attempt+'&limit=500&after_ts='+_logAfter)
			.then(r=>r.json()).then(d=>{
				if(!document.getElementById('log-stream-body')) return;
				const logs=d.logs||[];
				let h='';
				for(const l of logs){
					if(l.level<lvl) continue;
					const msg=l.message||'';
					if(search&&!msg.toLowerCase().includes(search)) continue;
					h += '<div class="log-line log-lvl-'+l.level+'">'
						+'<span class="log-ts">'+ts(l.ts)+'</span>'
						+'<span class="log-lvl">'+lvlLabel(l.level)+'</span>'
						+'<span class="log-logger">'+esc(l.logger||'')+'</span>'
						+'<span class="log-msg">'+esc(msg)+'</span></div>';
				}
				if(_logAfter===0) body.innerHTML = h||'<p class="placeholder">no logs yet</p>';
				else if(h) body.innerHTML += h;
				if(logs.length>0) _logAfter=logs[logs.length-1].ts;
				body.scrollTop=body.scrollHeight;
				setPoll('live · 2s');
				scheduleLoad(2000);
			}).catch(()=>{
				setPoll('error');
				scheduleLoad(5000);
			});
	}

	function setPoll(text){
		const el=document.getElementById('log-poll-indicator');
		if(el) el.textContent=text;
	}

	function lvlLabel(l){ return ({10:'DBG',20:'INF',30:'WRN',40:'ERR',50:'CRT'})[l]||String(l); }
	function ts(v){ return new Date(v*1000).toISOString().replace('T',' ').slice(0,19); }
	function sbc(s){
		if(s==='succeeded') return 'sb-ok';
		if(s==='failed'||s==='dead') return 'sb-err';
		if(s==='retried') return 'sb-retry';
		if(s==='started') return 'sb-running';
		return '';
	}
	function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

	document.getElementById('log-level-filter').addEventListener('change',()=>{
		_logAfter=0;
		const body=document.getElementById('log-stream-body');
		if(body) body.innerHTML='';
		scheduleLoad(0);
	});
	document.getElementById('log-search').addEventListener('input',()=>{
		clearTimeout(_searchTimer);
		_searchTimer=setTimeout(()=>{
			_logAfter=0;
			const body=document.getElementById('log-stream-body');
			if(body) body.innerHTML='';
			scheduleLoad(0);
		}, 250);
	});
	document.getElementById('log-close-btn').addEventListener('click',()=>{
		clearTimer();
		const surface=document.getElementById('log-stream-surface');
		if(surface) surface.style.display='none';
		setPoll('');
	});
})();
</script>
