{% if tasks %}
<table class="kuu-table">
	<thead>
		<tr>
			<th>task</th>
			<th>queue</th>
			<th>attempts</th>
			<th>timeout</th>
			<th></th>
		</tr>
	</thead>
	<tbody>
		{% for t in tasks %}
		<tr>
			<td class="mono-cell">{{ t.task_name }}</td>
			<td class="mono-cell">{{ t.task_queue }}</td>
			<td>{{ t.max_attempts }}</td>
			<td class="dim">{{ "%.1fs"|format(t.timeout) if t.timeout else "—" }}</td>
			<td class="action-cell">
				<button class="btn" onclick="kuuRunTask({{ t.task_name|tojson }})">run</button>
			</td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% else %}
<p class="placeholder">no tasks registered</p>
{% endif %}
