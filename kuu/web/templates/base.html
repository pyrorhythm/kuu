<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script>
		(function () {
			var u = location.href.split('?')[0].split('#')[0];
			if (!u.endsWith('/')) u += '/';
			document.write('<base href="' + u + '">');
			try {
				var saved = localStorage.getItem('kuu-theme');
				if (saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			} catch (_) { }
		}());
	</script>
	<title>{% block title %}kuu{% endblock %}</title>
	<link rel="icon" href="static/kuu-moon.svg" type="image/svg+xml">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="static/kuu.css">
	<script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta2/dist/htmx.min.js"></script>
</head>

<body>

	<header class="kuu-header">
		<a class="kuu-brand" href="." aria-label="kuu home">
			<img src="static/kuu-logo.svg" alt="kuu" height="22" style="display:block;">
		</a>
		<div class="kuu-header-right">
			<span class="kuu-header-sep"></span>
			<span class="kuu-header-label">dashboard</span>
			<span class="kuu-header-sep"></span>
			<button id="theme-toggle" class="theme-toggle" aria-label="toggle theme" title="toggle theme">
				<svg class="theme-icon theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
				<svg class="theme-icon theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
			</button>
		</div>
	</header>

	<main class="kuu-main">
		{% block content %}{% endblock %}
	</main>

	<!-- run-task dialog -->
	<dialog id="run-task-dialog" class="kuu-dialog">
		<div class="dialog-head">
			<span class="dialog-title">run task</span>
			<button class="btn" id="dialog-close">close</button>
		</div>
		<div class="dialog-body">
			<div class="dialog-task-name" id="dialog-task-name"></div>
			<div id="dialog-form-area">
				<p class="placeholder">loading…</p>
			</div>
		</div>
		<div class="dialog-foot">
			<button class="btn" id="dialog-cancel">cancel</button>
			<button class="btn btn-primary" id="dialog-submit">enqueue</button>
		</div>
	</dialog>

	<div id="kuu-toast" class="kuu-toast" aria-live="polite"></div>

	<script>
		(function () {
			const toggle = document.getElementById('theme-toggle');
			if (toggle) {
				toggle.addEventListener('click', function () {
					var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
					var next = cur === 'dark' ? 'light' : 'dark';
					if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
					else document.documentElement.removeAttribute('data-theme');
					try { localStorage.setItem('kuu-theme', next); } catch (_) { }
					window.dispatchEvent(new CustomEvent('kuu-theme-change', { detail: { theme: next } }));
				});
			}
		}());

		(function () {
			const dialog = document.getElementById('run-task-dialog');
			const taskNameEl = document.getElementById('dialog-task-name');
			const formArea = document.getElementById('dialog-form-area');
			const toast = document.getElementById('kuu-toast');
			let _toastTimer;

			function showToast(msg, ok) {
				toast.textContent = msg;
				toast.className = 'kuu-toast show ' + (ok ? 'ok' : 'err');
				clearTimeout(_toastTimer);
				_toastTimer = setTimeout(() => { toast.className = 'kuu-toast'; }, 3000);
			}

			function closeDialog() { dialog.close(); }
			document.getElementById('dialog-close').addEventListener('click', closeDialog);
			document.getElementById('dialog-cancel').addEventListener('click', closeDialog);

			function escAttr(s) {
				return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
			}

			function buildRaw() {
				dialog.dataset.mode = 'raw';
				formArea.innerHTML =
					'<label class="dialog-label" for="dialog-args">args (json array)</label>' +
					'<textarea class="dialog-input" id="dialog-args" rows="2">[]</textarea>' +
					'<label class="dialog-label" for="dialog-kwargs" style="margin-top:var(--s-3)">kwargs (json object)</label>' +
					'<textarea class="dialog-input" id="dialog-kwargs" rows="3">{}</textarea>';
			}

			function buildForm(params) {
				dialog.dataset.mode = 'form';
				const html = params.map(p => {
					const id = 'param-' + p.name;
					const typeHint = p.annotation ? ' <span class="param-type">' + escAttr(p.annotation) + '</span>' : '';
					const placeholder = p.required
						? (p.annotation || 'required')
						: (p.default !== null && p.default !== undefined ? JSON.stringify(p.default) : 'optional');
					const defVal = (!p.required && p.default !== null && p.default !== undefined)
						? (p.annotation === 'str' ? String(p.default) : JSON.stringify(p.default))
						: '';
					return '<div class="param-row">' +
						'<label class="dialog-label" for="' + escAttr(id) + '">' + escAttr(p.name) + typeHint + '</label>' +
						'<input class="dialog-input" id="' + escAttr(id) + '"' +
						' data-name="' + escAttr(p.name) + '"' +
						' data-ann="' + escAttr(p.annotation || '') + '"' +
						' placeholder="' + escAttr(placeholder) + '"' +
						' value="' + escAttr(defVal) + '">' +
						'</div>';
				}).join('');
				formArea.innerHTML = html || '<p class="placeholder">no parameters</p>';
			}

			window.kuuRunTask = async function (taskName, instance) {
				taskNameEl.textContent = taskName;
				formArea.innerHTML = '<p class="placeholder">loading…</p>';
				dialog.dataset.task = taskName;
				dialog.dataset.instance = instance || '';
				dialog.dataset.mode = 'raw';
				dialog.showModal();
				try {
					const qs = 'task=' + encodeURIComponent(taskName) + (instance ? '&instance=' + encodeURIComponent(instance) : '');
					const r = await fetch('api/task-params?' + qs);
					const d = await r.json();
					if (r.ok) {
						if (d.raw || d.params.length === 0) buildRaw();
						else buildForm(d.params);
					} else {
						buildRaw();
					}
				} catch (_) {
					buildRaw();
				}
				const first = formArea.querySelector('input, textarea');
				if (first) first.focus();
			};

			document.getElementById('dialog-submit').addEventListener('click', async () => {
				const task = dialog.dataset.task;
				const instance = dialog.dataset.instance || '';
				const mode = dialog.dataset.mode;
				let args = [], kwargs = {};

				if (mode === 'form') {
					const inputs = formArea.querySelectorAll('[data-name]');
					for (const input of inputs) {
						const name = input.dataset.name;
						const ann = input.dataset.ann;
						const raw = input.value;
						if (raw === '') continue;
						let value;
						if (ann === 'str') {
							value = raw;
						} else {
							try { value = JSON.parse(raw); } catch (_) {
								showToast(name + ': invalid value', false); return;
							}
						}
						kwargs[name] = value;
					}
				} else {
					const argsEl = document.getElementById('dialog-args');
					const kwargsEl = document.getElementById('dialog-kwargs');
					try { args = JSON.parse(argsEl ? argsEl.value || '[]' : '[]'); } catch (_) {
						showToast('args: invalid json', false); return;
					}
					try { kwargs = JSON.parse(kwargsEl ? kwargsEl.value || '{}' : '{}'); } catch (_) {
						showToast('kwargs: invalid json', false); return;
					}
					if (!Array.isArray(args)) { showToast('args must be a json array', false); return; }
					if (typeof kwargs !== 'object' || Array.isArray(kwargs)) {
						showToast('kwargs must be a json object', false); return;
					}
				}

				try {
					const payload = { task, args, kwargs };
					if (instance) payload.instance = instance;
					const r = await fetch('api/run-task', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(payload),
					});
					const d = await r.json().catch(() => ({}));
					if (r.ok) { closeDialog(); showToast('enqueued', true); }
					else { showToast(d.error || 'error', false); }
				} catch (_) { showToast('request failed', false); }
			});

			window.kuuTriggerJob = async function (jobId, instance) {
				try {
					const body = { job_id: jobId };
					if (instance) body.instance = instance;
					const r = await fetch('api/trigger-job', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(body),
					});
					const d = await r.json().catch(() => ({}));
					if (r.ok) {
						showToast('triggered', true);
						htmx.ajax('GET', 'fragments/scheduler', '#scheduler-frag');
					} else { showToast(d.error || 'error', false); }
				} catch (_) { showToast('request failed', false); }
			};

			window.kuuRemoveJob = async function (jobId, instance) {
				try {
					const body = { job_id: jobId };
					if (instance) body.instance = instance;
					const r = await fetch('api/remove-job', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(body),
					});
					const d = await r.json().catch(() => ({}));
					if (r.ok) {
						showToast('removed', true);
						htmx.ajax('GET', 'fragments/scheduler', '#scheduler-frag');
					} else { showToast(d.error || 'error', false); }
				} catch (_) { showToast('request failed', false); }
			};
		}());
	</script>

</body>

</html>
